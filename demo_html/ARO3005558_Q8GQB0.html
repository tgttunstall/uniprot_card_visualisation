                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "blue", "font": {"color": "#111111", "multi": true, "size": 47}, "group": "card", "id": "ARO:3000040", "label": "hydrolysis of antibiotic conferring\nresistance", "shape": "dot", "size": 31, "title": "ARO:3000040: hydrolysis of antibiotic conferring resistance; \"Hydrolysis of an antibiotic\nmolecule to confer resistance.\" []"}, {"color": "blue", "font": {"color": "#111111", "multi": true, "size": 47}, "group": "card", "id": "ARO:3000187", "label": "hydrolysis of beta-lactam antibiotic\nby serine beta-lactamase", "shape": "dot", "size": 31, "title": "ARO:3000187: hydrolysis of beta-lactam antibiotic by serine beta-lactamase; \"Mechanism\nof enzymatic degradation common to Ambler Class A, C and D beta-lactamases. A serine\nresidue located in the active site is used to form an acyl-enzyme intermediate and\nsubsequent hydrolysis renders the beta-lactam inactive.\" []"}, {"color": "blue", "font": {"color": "#111111", "multi": true, "size": 47}, "group": "card", "id": "ARO:3005558", "label": "BUT-2", "shape": "dot", "size": 31, "title": "ARO:3005558: BUT-2; \"BUT-2 is a BUT beta-lactamase.\" []"}, {"color": "blue", "font": {"color": "#111111", "multi": true, "size": 47}, "group": "card", "id": "ARO:3000001", "label": "beta-lactamase", "shape": "dot", "size": 31, "title": "ARO:3000001: beta-lactamase; \"Beta-lactamases are enzymes (EC 3.5.2.6) produced by\nsome bacteria and are responsible for their resistance to beta-lactam antibiotics\nlike penicillins, cephalosporins (are relatively resistant to beta-lactamase), cephamycins,\nand carbapenems (ertapenem). These antibiotics have a common element in their molecular\nstructure: a four-atom ring known as a beta-lactam. The lactamase enzyme breaks that\nring open, deactivating the molecule\u0027s antibacterial properties. Beta-lactam antibiotics\nare typically used to treat a broad spectrum of gram-positive and gram-negative bacteria.\nBeta-lactamases produced by gram-negative organisms are usually secreted.\" [PMID:6109327,\nPMID:7574506, PMID:19995920, PMID:21220461]"}, {"color": "mediumorchid", "font": {"color": "#111111", "multi": true, "size": 47}, "group": "Drug Class", "id": "ARO:0000032", "label": "cephalosporin", "shape": "dot", "size": 31, "title": "ARO:0000032: cephalosporin; \"Cephalosporins are a class of beta-lactam antibiotics,\ncontaining the beta-lactam ring fused with a dihydrothiazolidine ring. Together with\ncephamycins they belong to a sub-group called cephems. Cephalosporin are bactericidal,\nand act by inhibiting the synthesis of the peptidoglycan layer of bacterial cell\nwalls. The peptidoglycan layer is important for cell wall structural integrity, especially\nin Gram-positive organisms.\" [PMID:15673804, PMID:11585791, PMID:6810737]"}, {"color": "blue", "font": {"color": "#111111", "multi": true, "size": 47}, "group": "card", "id": "ARO:3000007", "label": "beta-lactam antibiotic", "shape": "dot", "size": 31, "title": "ARO:3000007: beta-lactam antibiotic; \"Beta-lactam antibiotics are a broad class of\nantibiotics that include penams (penicillin derivatives), cephems (cephalosporins),\nmonobactams, and carbapenems. These antibiotic agents contain a beta-lactam nucleus\nin its molecular structure. They are the most widely-used group of antibiotics.\"\n[PMID:3889939]"}, {"color": "blue", "font": {"color": "#111111", "multi": true, "size": 47}, "group": "card", "id": "ARO:3000557", "label": "antibiotic inactivation enzyme", "shape": "dot", "size": 31, "title": "ARO:3000557: antibiotic inactivation enzyme; \"Enzyme that catalyzes the inactivation\nof an antibiotic resulting in resistance. Inactivation includes chemical modification,\ndestruction, etc.\" []"}, {"color": "blue", "font": {"color": "#111111", "multi": true, "size": 47}, "group": "card", "id": "ARO:3000076", "label": "class C beta-lactamase", "shape": "dot", "size": 31, "title": "ARO:3000076: class C beta-lactamase; \"AmpC type beta-lactamases are commonly isolated\nfrom extended-spectrum cephalosporin-resistant Gram-negative bacteria. AmpC beta-lactamases\n(also termed class C or group 1) are typically encoded on the chromosome of many\nGram-negative bacteria including Citrobacter, Serratia, Enterobacter species, and\nP. aeruginosa where its expression is usually inducible; it may also occur on Escherichia\ncoli but is not usually inducible, although it can be hyperexpressed. AmpC type beta-lactamases\nmay also be carried on plasmids. AmpC beta-lactamases, in contrast to ESBLs, hydrolyse\nbroad and extended-spectrum cephalosporins (cephamycins as well as to oxyimino-beta-lactams)\nbut are not inhibited by beta-lactamase inhibitors such as clavulanic acid.\" [PMID:19822890]"}, {"color": "deepskyblue", "font": {"color": "#111111", "multi": true, "size": 49}, "group": "Resistance Mechanism", "id": "ARO:0001004", "label": "antibiotic inactivation", "shape": "dot", "size": 37, "title": "ARO:0001004: antibiotic inactivation; \"Enzymatic inactivation of antibiotic to confer\ndrug resistance.\" [PMID:20564281]"}, {"color": "steelblue", "font": {"color": "#111111", "multi": true, "size": 47}, "group": "AMR Gene Family", "id": "ARO:3004293", "label": "BUT beta-lactamase", "shape": "dot", "size": 31, "title": "ARO:3004293: BUT beta-lactamase; \"A class C beta-lactamase family of chromosome-encoded\nantibiotic resistance genes originally described from Buttiauxella spp.\" [PMID:12127496]"}, {"color": "red", "font": {"color": "#111111", "multi": true, "size": 45}, "group": "uniprot", "id": "Q8GQB0", "label": "Q8GQB0", "shape": "dot", "size": 25, "title": "Q8GQB0"}]);
