rial protein synthesis. More specifically, the phenicols block peptide\nelongation by binding to the peptidyltansferase centre of the 70S ribosome.\" [PMID:12860128]"}, {"color": "steelblue", "font": {"color": "#111111", "multi": true, "size": 47}, "group": "AMR Gene Family", "id": "ARO:0010004", "label": "resistance-nodulation-cell division\n(RND) antibiotic efflux pump", "shape": "dot", "size": 31, "title": "ARO:0010004: resistance-nodulation-cell division (RND) antibiotic efflux pump; \"Directed\npumping of antibiotic out of a cell to confer resistance. Resistance-nodulation-division\n(RND) proteins are found in both prokaryotic and eukaryotic cells and have diverse\nsubstrate specificities and physiological roles. However, there are relatively few\nRND transporters and they are secondary transporters, energized not by ATP binding/hydrolysis\nbut by proton movement down the transmembrane electrochemical gradient.\" [PMID:15582398,\nPMID:16915237, PMID:19664953]"}, {"color": "blue", "font": {"color": "#111111", "multi": true, "size": 47}, "group": "card", "id": "ARO:3000219", "label": "mutant efflux regulatory protein conferring\nantibiotic resistance", "shape": "dot", "size": 31, "title": "ARO:3000219: mutant efflux regulatory protein conferring antibiotic resistance; \"Efflux\nregulatory proteins with mutations that result in increased expression of efflux\nproteins.\" []"}, {"color": "mediumorchid", "font": {"color": "#111111", "multi": true, "size": 47}, "group": "Drug Class", "id": "ARO:0000001", "label": "fluoroquinolone antibiotic", "shape": "dot", "size": 31, "title": "ARO:0000001: fluoroquinolone antibiotic; \"The fluoroquinolones are a family of synthetic\nbroad-spectrum antibiotics that are 4-quinolone-3-carboxylates. These compounds interact\nwith topoisomerase II (DNA gyrase) to disrupt bacterial DNA replication, damage DNA,\nand cause cell death.\" [PMID:3802748, PMID:3311572, PMID:23010009]"}, {"color": "rebeccapurple", "font": {"color": "#111111",
